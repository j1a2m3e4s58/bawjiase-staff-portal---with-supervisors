services:
  - type: web
    name: bawjiase-mail-api
    env: python
    rootDir: src/mail-api
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /api/health
    envVars:
      - key: PORTAL_DATA_DIR
        sync: false
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        value: "465"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: PORTAL_PUBLIC_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: bawjiase-staff-portal
    runtime: static
    buildCommand: pnpm install --frozen-lockfile --ignore-scripts && cd src/frontend && pnpm build
    staticPublishPath: src/frontend/dist
    envVars:
      - key: HUSKY
        value: "0"
      - key: VITE_MAIL_API_URL
        sync: false
      - key: VITE_IT_ACCESS_CODE
        sync: false
      - key: VITE_HR_ACCESS_CODE
        sync: false
      - key: VITE_ENABLE_SEEDED_FALLBACK
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
